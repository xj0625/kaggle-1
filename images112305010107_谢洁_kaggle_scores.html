<!DOCTYPE html>
<html>
<head>
    <title>Kaggle Scores</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            width: 800px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .header div {
            font-weight: bold;
            color: #666;
        }
        .submission {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .submission:last-child {
            border-bottom: none;
        }
        .status {
            margin-right: 15px;
        }
        .status .check {
            width: 24px;
            height: 24px;
            background-color: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .file-name {
            flex: 1;
            font-weight: 500;
        }
        .score {
            width: 100px;
            text-align: right;
            font-weight: bold;
        }
        .score-value {
            color: #333;
        }
        .best {
            background-color: #e8f5e8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>提交与描述</div>
            <div>私人评分</div>
            <div>公开评分</div>
        </div>
        <div class="submission best">
            <div class="status">
                <div class="check">✓</div>
            </div>
            <div class="file-name">submission_best_single.csv</div>
            <div class="score"><span class="score-value">0.96592</span></div>
            <div class="score"><span class="score-value">0.96592</span></div>
        </div>
        <div class="submission">
            <div class="status">
                <div class="check">✓</div>
            </div>
            <div class="file-name">submission_final.csv</div>
            <div class="score"><span class="score-value">0.89816</span></div>
            <div class="score"><span class="score-value">0.89816</span></div>
        </div>
        <div class="submission">
            <div class="status">
                <div class="check">✓</div>
            </div>
            <div class="file-name">improved_submission.csv</div>
            <div class="score"><span class="score-value">0.89556</span></div>
            <div class="score"><span class="score-value">0.89556</span></div>
        </div>
        <div class="submission">
            <div class="status">
                <div class="check">✓</div>
            </div>
            <div class="file-name">word2vec_logreg_new_submission.csv</div>
            <div class="score"><span class="score-value">0.87552</span></div>
            <div class="score"><span class="score-value">0.87552</span></div>
        </div>
        <div class="submission">
            <div class="status">
                <div class="check">✓</div>
            </div>
            <div class="file-name">combined_submission.csv</div>
            <div class="score"><span class="score-value">0.88008</span></div>
            <div class="score"><span class="score-value">0.88008</span></div>
        </div>
    </div>
</body>
</html>
